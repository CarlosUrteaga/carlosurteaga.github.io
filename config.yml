baseURL: "https://urteaga.tech/" 
title: Carlos Urteaga Reyesvera
theme: PaperMod
enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 10

taxonomies:
    tag: tags

menu:
    main:
        - name: Papers
          url: papers/
          weight: 2
        - name: Projects
          url: projects/
          weight: 3
        - name: Courses
          url: courses/
          weight: 4
        - name: About
          url: about/
          weight: 5

params: # optional Windows tile color
    description: "This website hosts Carlos Urteaga's research papers and professional career."
    author: Carlos Urteaga
    googleAnalyticsID: "G-2Q2JH91MZC"
    images: ["cover.png"]
    DateFormat: "January 2006"
    defaultTheme: auto
    hideFooter: true
    disableThemeToggle: false
    ShowShareButtons: false
    ShowReadingTime: false
    ShowWordCount: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    disableScrollToTop: true
    ShowCodeCopyButtons: true
    ShowToc: false
    TocOpen: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Carlos Urteaga
          subtitle: "Principal AI Engineer, AI Architect, and Ph.D. student focused on the operational maturity of LLM-powered AI agents.\n\n\nHe builds production-grade AI systems across RAG, AI agents, evaluation, observability, and cloud delivery, connecting research, engineering, and governance in real operational environments.\n\n\nOpen to research collaborations, applied AI projects, and advisory work in operational AI, agentic systems, and AI governance."
          imageUrl: "/picture.png"
          imageWidth: 180
          imageHeight: 240
          buttons:
            - name: Papers
              url: papers/
            - name: Projects
              url: projects/
            - name: Courses
              url: courses/
            - name: About
              url: about/

    socialIcons:
        - name: CV
          url: cv.pdf
        - name: Email
          url: mailto:carlos.urteaga@outlook.com
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=qlL6Ef8AAAAJ&hl=es
        - name: LinkedIn
          url: https://www.linkedin.com/in/carlos-urteaga/
        - name: GitHub
          url: https://github.com/CarlosUrteaga

    assets:
        disableScrollBarStyle: true
        favicon16x16: "/favicon-16x16.png"
        favicon32x32: "/favicon-32x32.png"
        apple_touch_icon: "/apple-touch-icon.png"
        theme_color: "#0c0f19"              # option
        favicon: "/favicon.ico?v=2"
        safari_pinned_tab: "/safari-pinned-tab.svg"
        msapplication_TileColor: "#0b0a19" 
    cover:
        hiddenInList: true
        hiddenInSingle: true
    label:
      text: "Carlos Urteaga"
      icon: favicon.ico
      iconHeight: 18

